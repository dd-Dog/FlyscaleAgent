<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FlyAgent 登录</title>
  <style>
    :root { font-family: system-ui, sans-serif; background: #0f1419; color: #e6edf3; }
    body { max-width: 400px; margin: 4rem auto; padding: 1.5rem; }
    h1 { font-size: 1.25rem; font-weight: 600; }
    section { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 1.25rem; }
    label { display: block; margin: 0.75rem 0 0.25rem; font-size: 0.875rem; color: #8b949e; }
    input { width: 100%; box-sizing: border-box; padding: 0.5rem 0.65rem; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: #e6edf3; }
    button { margin-top: 1rem; padding: 0.5rem 1rem; border-radius: 6px; border: 1px solid #30363d; background: #21262d; color: #e6edf3; cursor: pointer; }
    button:hover { background: #30363d; }
    .err { color: #f85149; font-size: 0.875rem; margin-top: 0.75rem; }
  </style>
</head>
<body>
  <h1>FlyAgent 管理登录</h1>
  <section>
    <form id="f">
      <label for="u">用户名</label>
      <input id="u" name="username" autocomplete="username" required />
      <label for="p">密码</label>
      <input id="p" name="password" type="password" autocomplete="current-password" required />
      <button type="submit">登录</button>
      <div class="err" id="err" style="display:none;"></div>
    </form>
  </section>
  <script>
    document.getElementById("f").onsubmit = async (e) => {
      e.preventDefault();
      const err = document.getElementById("err");
      err.style.display = "none";
      const username = document.getElementById("u").value;
      const password = document.getElementById("p").value;
      const r = await fetch("/api/admin/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        credentials: "include",
        body: JSON.stringify({ username, password }),
      });
      if (r.ok) {
        window.location.href = "/";
        return;
      }
      let msg = "登录失败";
      try {
        const j = await r.json();
        if (j.detail) msg = typeof j.detail === "string" ? j.detail : JSON.stringify(j.detail);
      } catch (_) {}
      err.textContent = msg;
      err.style.display = "block";
    };
  </script>
</body>
</html>
